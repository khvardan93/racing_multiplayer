<!DOCTYPE html>
<html lang="en-us">
<head>
    <meta charset="utf-8">
    <title>My WebGL Game</title>
    <style>
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #231f20; }
        #unity-wrapper { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
        canvas { display: block; }
    </style>
</head>
<body>
    <div id="unity-wrapper">
        <canvas id="unity-canvas" width={{{ WIDTH }}} height={{{ HEIGHT }}}></canvas>
    </div>
    <script src="Build/{{{ LOADER_FILENAME }}}"></script>
    <script>
        const canvas = document.querySelector("#unity-canvas");
        const ASPECT_RATIO = 16 / 9; // Set your desired game aspect ratio here

        function resizeCanvas() {
            const vw = window.innerWidth;
            const vh = window.innerHeight;
            let w = vw;
            let h = vw / ASPECT_RATIO;

            if (h > vh) {
                h = vh;
                w = vh * ASPECT_RATIO;
            }
            canvas.style.width = Math.floor(w) + "px";
            canvas.style.height = Math.floor(h) + "px";
        }

        window.addEventListener("resize", resizeCanvas);
        
        createUnityInstance(canvas, {
            dataUrl: "Build/{{{ DATA_FILENAME }}}",
            frameworkUrl: "Build/{{{ FRAMEWORK_FILENAME }}}",
            codeUrl: "Build/{{{ CODE_FILENAME }}}",
            streamingAssetsUrl: "StreamingAssets",
            companyName: "{{{ COMPANY_NAME }}}",
            productName: "{{{ PRODUCT_NAME }}}",
            productVersion: "{{{ PRODUCT_VERSION }}}",
        }).then(() => {
            resizeCanvas();
        });
    </script>
</body>
</html>
