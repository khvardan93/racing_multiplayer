<!DOCTYPE html>
<html lang="en-us">
<head>
    <meta charset="utf-8">
    <title>My WebGL Game</title>
    <style>
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #231f20; }
        #unity-wrapper { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
        canvas { display: block; }
    </style>
</head>
<body>
    <div id="unity-wrapper">
        <canvas id="unity-canvas" width=960 height=600></canvas>
    </div>
    <script src="Build/WebGL.loader.js"></script>
    <script>
        const canvas = document.querySelector("#unity-canvas");
        const ASPECT_RATIO = 16 / 9; // Set your desired game aspect ratio here

        function resizeCanvas() {
            const vw = window.innerWidth;
            const vh = window.innerHeight;
            let w = vw;
            let h = vw / ASPECT_RATIO;

            if (h > vh) {
                h = vh;
                w = vh * ASPECT_RATIO;
            }
            canvas.style.width = Math.floor(w) + "px";
            canvas.style.height = Math.floor(h) + "px";
        }

        window.addEventListener("resize", resizeCanvas);
        
        createUnityInstance(canvas, {
            dataUrl: "Build/WebGL.data.unityweb",
            frameworkUrl: "Build/WebGL.framework.js.unityweb",
            codeUrl: "Build/WebGL.wasm.unityweb",
            streamingAssetsUrl: "StreamingAssets",
            companyName: "Khvardan",
            productName: "RacerCar",
            productVersion: "0.0.78",
        }).then(() => {
            resizeCanvas();
        });
    </script>
</body>
</html>
