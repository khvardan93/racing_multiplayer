<div style="background: var(--color-background-secondary); border-radius: var(--border-radius-lg); padding: 1.5rem; position: relative; min-height: 380px;">

  <div style="position: absolute; top: 16px; left: 16px; width: 140px; height: 90px; background: var(--color-background-primary); border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-tertiary); display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 4px;">
    <i class="ti ti-camera" style="font-size: 22px; color: var(--color-text-tertiary);" aria-hidden="true"></i>
    <span style="font-size: 10px; color: var(--color-text-tertiary);">Player 2 view</span>
  </div>

  <div style="position: absolute; top: 114px; left: 16px; display: flex; flex-direction: column; gap: 8px; width: 140px;">

      <i class="ti ti-heart" style="font-size: 16px; color: var(--color-text-danger);" aria-hidden="true"></i>
      <div style="flex: 1; height: 8px; background: var(--color-background-secondary); border-radius: 4px; overflow: hidden;">
        <div style="width: 72%; height: 100%; background: var(--color-text-danger);"></div>
      </div>
      <span style="font-size: 12px; font-weight: 500;">72</span>
    </div>
    <div style="display: flex; align-items: center; gap: 8px; background: var(--color-background-primary); border-radius: var(--border-radius-md); padding: 6px 10px; border: 0.5px solid var(--color-border-tertiary);">
      <i class="ti ti-bolt" style="font-size: 16px; color: var(--color-text-info);" aria-hidden="true"></i>
      <div style="flex: 1; height: 8px; background: var(--color-background-secondary); border-radius: 4px; overflow: hidden;">
        <div style="width: 45%; height: 100%; background: var(--color-text-info);"></div>
      </div>
      <span style="font-size: 12px; font-weight: 500;">45</span>
    </div>
  </div>

  <div style="position: absolute; top: 16px; right: 16px; width: 120px; height: 120px; background: var(--color-background-primary); border-radius: 50%; border: 0.5px solid var(--color-border-tertiary); display: flex; flex-direction: column; align-items: center; justify-content: center;">
    <svg width="80" height="80" viewBox="0 0 80 80" style="position: absolute;">
      <circle cx="40" cy="40" r="34" fill="none" stroke="var(--color-border-tertiary)" stroke-width="4"/>
      <circle cx="40" cy="40" r="34" fill="none" stroke="var(--color-text-info)" stroke-width="4" stroke-dasharray="160 213" stroke-linecap="round" transform="rotate(-225 40 40)"/>
    </svg>
    <span style="font-size: 20px; font-weight: 500; z-index: 1;">86</span>
    <span style="font-size: 10px; color: var(--color-text-tertiary); z-index: 1;">km/h</span>
  </div>

  <div style="position: absolute; top: 16px; left: 50%; transform: translateX(-50%); background: var(--color-background-primary); border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-tertiary); padding: 6px 14px; font-size: 13px; font-weight: 500;">
    03:45
  </div>

  <div style="position: absolute; bottom: 16px; left: 16px; display: flex; align-items: center; gap: 6px; background: var(--color-background-primary); border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-tertiary); padding: 6px 12px;">
    <i class="ti ti-target" style="font-size: 16px; color: var(--color-text-secondary);" aria-hidden="true"></i>
    <span style="font-size: 13px; font-weight: 500;">24 / 30</span>
  </div>

  <div style="position: absolute; bottom: 16px; right: 16px; background: var(--color-background-primary); border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-tertiary); padding: 6px 12px; display: flex; align-items: center; gap: 6px;">
    <i class="ti ti-crown" style="font-size: 16px; color: var(--color-text-warning);" aria-hidden="true"></i>
    <span style="font-size: 12px; color: var(--color-text-secondary);">Host</span>
  </div>

</div>
