<div style="background: var(--color-background-secondary); border-radius: var(--border-radius-lg); padding: 2rem; display: flex; justify-content: center;">
<div style="background: var(--color-background-primary); border-radius: var(--border-radius-lg); border: 0.5px solid var(--color-border-tertiary); padding: 2.5rem 2rem; width: 380px; display: flex; flex-direction: column; align-items: center; text-align: center;">

  <i class="ti ti-steering-wheel" style="font-size: 36px; color: var(--color-text-info); margin-bottom: 1rem;" aria-hidden="true"></i>

  <p style="font-weight: 500; font-size: 22px; margin: 0 0 4px;">Your game title</p>
  <p style="font-size: 13px; color: var(--color-text-secondary); margin: 0 0 2rem;">A 2-player online race</p>

  <button style="width: 100%; font-weight: 500; margin-bottom: 8px;" onclick="sendPrompt('Show me the host flow logic')">
    <i class="ti ti-server-2" style="font-size:16px; vertical-align:-2px; margin-right:6px" aria-hidden="true"></i>Host game
  </button>
  <button style="width: 100%; margin-bottom: 8px;" onclick="sendPrompt('Show me the join flow logic')">
    <i class="ti ti-login" style="font-size:16px; vertical-align:-2px; margin-right:6px" aria-hidden="true"></i>Join game
  </button>
  <button style="width: 100%; background: transparent; border: none;" onclick="sendPrompt('Show me the settings screen mockup')">
    <i class="ti ti-settings" style="font-size:16px; vertical-align:-2px; margin-right:6px" aria-hidden="true"></i>Settings
  </button>

  <p style="font-size: 11px; color: var(--color-text-tertiary); margin: 1.5rem 0 0;">v0.1.0</p>

</div>
</div>
