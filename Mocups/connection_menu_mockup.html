<div style="background: var(--color-background-secondary); border-radius: var(--border-radius-lg); padding: 2rem; display: flex; justify-content: center;">
<div style="background: var(--color-background-primary); border-radius: var(--border-radius-lg); border: 0.5px solid var(--color-border-tertiary); padding: 1.5rem; width: 340px;">
  <p style="font-weight: 500; font-size: 18px; margin: 0 0 4px;">Join a match</p>
  <p style="font-size: 13px; color: var(--color-text-secondary); margin: 0 0 1.25rem;">Host a new room or join an existing one</p>

  <label style="font-size: 13px; color: var(--color-text-secondary); display: block; margin-bottom: 6px;">Room name</label>
  <input type="text" placeholder="e.g. MyRoom123" style="width: 100%; margin-bottom: 1rem;" />

  <label style="font-size: 13px; color: var(--color-text-secondary); display: block; margin-bottom: 6px;">Player name</label>
  <input type="text" placeholder="Your name" style="width: 100%; margin-bottom: 1.25rem;" />

  <div style="display: flex; gap: 8px; margin-bottom: 12px;">
    <button style="flex: 1; font-weight: 500;" onclick="sendPrompt('Show me the host flow logic')"><i class="ti ti-server-2" style="font-size:16px; vertical-align:-2px; margin-right:6px" aria-hidden="true"></i>Host</button>
    <button style="flex: 1;" onclick="sendPrompt('Show me the join flow logic')"><i class="ti ti-login" style="font-size:16px; vertical-align:-2px; margin-right:6px" aria-hidden="true"></i>Join</button>
  </div>

  <div style="display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--color-text-tertiary); justify-content: center;">
    <i class="ti ti-wifi" style="font-size: 14px;" aria-hidden="true"></i>
    <span>Connecting...</span>
  </div>
</div>
</div>
