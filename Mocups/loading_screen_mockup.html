<div style="background: var(--color-background-secondary); border-radius: var(--border-radius-lg); padding: 2rem; display: flex; justify-content: center;">
<div style="background: var(--color-background-primary); border-radius: var(--border-radius-lg); border: 0.5px solid var(--color-border-tertiary); padding: 2.5rem 2rem; width: 380px; display: flex; flex-direction: column; align-items: center;">

  <i class="ti ti-loader-2" style="font-size: 32px; color: var(--color-text-secondary); margin-bottom: 1.25rem;" aria-hidden="true"></i>

    <div style="display: flex; align-items: center; gap: 6px;">
