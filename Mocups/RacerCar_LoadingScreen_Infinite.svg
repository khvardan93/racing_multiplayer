<svg width="1920" height="1080" viewBox="0 0 1920 1080" fill="none" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif">

  <!-- ===== BACKGROUND ===== -->
  <g id="background">
    <rect width="1920" height="1080" fill="#0D1B2A"/>
    <rect width="1920" height="1080" fill="url(#vignette)"/>
    <g id="speed-lines" opacity="0.06" stroke="#00E5FF" stroke-width="3">
      <line x1="1400" y1="-50" x2="900"  y2="1130"/>
      <line x1="1520" y1="-50" x2="1020" y2="1130"/>
      <line x1="1700" y1="-50" x2="1200" y2="1130"/>
    </g>
  </g>

  <!-- ===== LOGO ===== -->
  <g id="logo">
    <text x="960" y="490" text-anchor="middle" font-size="110" font-weight="900" letter-spacing="14" fill="#FFFFFF">RACER<tspan fill="#00E5FF">CAR</tspan></text>
  </g>

  <!-- ===== INDETERMINATE PROGRESS BAR ===== -->
  <g id="progress-bar">
    <!-- track -->
    <rect id="bar-track" x="660" y="640" width="600" height="10" rx="5" fill="#1B2A41"/>
    <!-- sliding segment (loops left to right; SMIL animates in browser preview, static in Penpot) -->
    <g clip-path="url(#bar-clip)">
      <rect id="bar-runner" x="660" y="640" width="180" height="10" rx="5" fill="#00E5FF">
        <animate attributeName="x" values="480;1260" dur="1.2s" repeatCount="indefinite"/>
      </rect>
    </g>
  </g>

  <!-- ===== LOADING LABEL ===== -->
  <g id="loading-label">
    <text x="960" y="710" text-anchor="middle" font-size="26" font-weight="700" letter-spacing="8" fill="#8DA3B8">LOADING</text>
  </g>

  <!-- ===== TIP TEXT ===== -->
  <g id="tip">
    <text x="960" y="1000" text-anchor="middle" font-size="22" fill="#5C7089">Tip: Draft behind your opponent to gain a speed boost</text>
  </g>

  <defs>
    <clipPath id="bar-clip">
      <rect x="660" y="640" width="600" height="10" rx="5"/>
    </clipPath>
    <radialGradient id="vignette" cx="0.5" cy="0.45" r="0.75">
      <stop offset="0.6" stop-color="#0D1B2A" stop-opacity="0"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.45"/>
    </radialGradient>
  </defs>
</svg>
