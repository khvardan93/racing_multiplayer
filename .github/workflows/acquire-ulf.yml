name: Acquire ULF
on: workflow_dispatch

jobs:
  activate:
    runs-on: ubuntu-latest
    container: unityci/editor:2022.3.42f1-base-3
    steps:
      - name: Activate personal license
        env:
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        run: |
          /opt/unity/Editor/Data/Resources/Licensing/Client/Unity.Licensing.Client \
            --activate-ulf --username "$UNITY_EMAIL" --password "$UNITY_PASSWORD" || true
          echo "=== Searching for ULF files ==="
          find / -name "*.ulf" 2>/dev/null || true
          mkdir -p /tmp/ulf
          find / -name "*.ulf" -exec cp {} /tmp/ulf/ \; 2>/dev/null || true
          ls -la /tmp/ulf/

      - name: Upload ULF
        uses: actions/upload-artifact@v4
        with:
          name: Unity_lic
          path: /tmp/ulf/*.ulf
          if-no-files-found: warn